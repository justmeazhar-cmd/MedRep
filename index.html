<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedRep - Patient Medical Report Assistant</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          animation: {
            'spin-slow': 'spin 8s linear infinite',
            'pulse-soft': 'pulse 3s ease-in-out infinite',
            'fade-in': 'fadeIn 0.5s ease-out',
            'slide-up': 'slideUp 0.4s ease-out',
            'slide-in-right': 'slideInRight 0.3s ease-out',
            'scale-in': 'scaleIn 0.2s ease-out'
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            slideInRight: { '0%': { opacity: '0', transform: 'translateX(10px)' }, '100%': { opacity: '1', transform: 'translateX(0)' } },
            scaleIn: { '0%': { opacity: '0', transform: 'scale(0.95)' }, '100%': { opacity: '1', transform: 'scale(1)' } }
          }
        }
      }
    }
  </script>

  <!-- React & ReactDOM CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- Babel CDN -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    Babel.registerPreset('classic-react', {
      presets: [[Babel.availablePresets['react'], { runtime: 'classic' }]]
    });
  </script>
  
  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  </script>
  
  <!-- Tesseract.js for OCR -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

  <script>
    if (window.location.protocol === 'file:') {
      document.write('<div style="position:fixed;top:0;left:0;right:0;z-index:9999;background:#dc2626;color:white;padding:20px;font-family:sans-serif;text-align:center;font-size:16px;"><strong>Cannot load from file:// protocol</strong><br>Please use a local HTTP server. VS Code users: right-click file → "Open with Live Server"<br><br><button onclick="this.parentElement.remove()" style="background:white;color:#dc2626;border:none;padding:8px 20px;border-radius:6px;font-weight:bold;cursor:pointer;margin-top:8px;">Dismiss</button></div>');
    }
  </script>

  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }
    .skeleton { background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    .dark .skeleton { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  </style>
</head>
<body class="antialiased">
  <div id="root"></div>

  <script type="text/babel" data-presets="classic-react">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    // ==========================================
    // PRESET DEMO DATA
    // ==========================================
    const PRESET_DOCUMENTS = [
      {
        id: 'doc-1', name: 'Comprehensive_Metabolic_Panel.pdf',
        pagesCount: 2, uploadDate: '2026-05-12',
        pages: [{
          pageNumber: 1, title: 'Patient Lab Report - Page 1 of 2',
          content: `PATIENT RECORD ID: #9942819\nDATE OF TEST: May 10, 2026\nCLINIC: City Health Diagnostics\n\nTEST RESULT PANEL SUMMARY:\n- Fasting Plasma Glucose: 112 mg/dL [Reference Range: 70 - 99 mg/dL] (HIGH)\n- Hemoglobin A1c: 5.8% [Reference Range: < 5.7%] (HIGH - Prediabetic range)\n- Serum Creatinine: 0.95 mg/dL [Reference Range: 0.60 - 1.20 mg/dL] (Normal)\n- Blood Urea Nitrogen (BUN): 14 mg/dL [Reference Range: 7 - 20 mg/dL] (Normal)\n- Sodium: 139 mEq/L [Reference Range: 135 - 145 mEq/L] (Normal)\n- Potassium: 4.1 mEq/L [Reference Range: 3.5 - 5.0 mEq/L] (Normal)\n\nCLINICAL NOTE: Fasting blood sugar level is elevated. Patient should monitor dietary carbohydrate intake and consult primary care provider regarding prediabetic values.`,
          highlights: [{ id: 'h-1', text: 'Fasting Plasma Glucose: 112 mg/dL', label: 'Abnormal Glucose' }, { id: 'h-2', text: 'Hemoglobin A1c: 5.8%', label: 'Prediabetic Range' }]
        }, {
          pageNumber: 2, title: 'Lipid Panel & Cardiological Markers - Page 2 of 2',
          content: `PATIENT RECORD ID: #9942819\nDATE OF TEST: May 10, 2026\n\nLIPID SUBSECTION PANEL:\n- Total Cholesterol: 235 mg/dL [Reference Range: < 200 mg/dL] (HIGH)\n- Triglycerides: 165 mg/dL [Reference Range: < 150 mg/dL] (HIGH)\n- HDL Cholesterol (Good): 42 mg/dL [Reference Range: > 40 mg/dL] (Normal)\n- LDL Cholesterol (Bad): 160 mg/dL [Reference Range: < 100 mg/dL] (CRITICAL HIGH)\n\nRECOMMENDATION: Patient displays moderate cardiovascular dyslipidemia risk.`,
          highlights: [{ id: 'h-3', text: 'LDL Cholesterol (Bad): 160 mg/dL', label: 'Critical LDL Lipid Marker' }]
        }]
      },
      {
        id: 'doc-2', name: 'Brain_MRI_Report.pdf',
        pagesCount: 1, uploadDate: '2026-05-13',
        pages: [{
          pageNumber: 1, title: 'Neurological Imaging Suite - MRI Report',
          content: `PATIENT RECORD ID: #9942819\nDATE OF SCAN: May 11, 2026\nIMAGING PROTOCOL: Brain MRI without contrast\n\nFINDINGS:\n- Ventricles and Sulci: Normal in size and configuration for patient age.\n- Brain Parenchyma: No acute intracranial hemorrhage, mass effect, or midline shift.\n- White Matter: Scattered, non-specific T2/FLAIR hyperintensities in the subcortical white matter.\n- Vessels: Major intracranial arterial flow voids are intact.\n- Sinuses: Mild mucosal thickening in the left maxillary sinus.\n\nIMPRESSION:\n1. No acute territorial cerebral infarction or acute intracranial hemorrhage.\n2. Non-specific T2 subcortical white matter hyperintensities.\n3. Mild left maxillary sinusitis.`,
          highlights: [{ id: 'h-4', text: 'Scattered, non-specific T2/FLAIR hyperintensities', label: 'Subcortical Hyperintensities' }]
        }]
      }
    ];

    const PRESET_RESPONSES = [
      { keywords: ['glucose', 'sugar', 'diabetic', 'a1c'],
        answer: "Your Fasting Plasma Glucose is elevated at 112 mg/dL (normal range is 70-99 mg/dL) and your Hemoglobin A1c is 5.8% (normal is below 5.7%). These markers suggest you are in the prediabetic range.",
        simpleExplanation: "Think of your bloodstream like a highway. Right now, there is a small traffic jam of sugar cars because the traffic directors (insulin) are working a bit slower.",
        evidence: [{ docName: "Comprehensive_Metabolic_Panel.pdf", page: 1, text: "Fasting Plasma Glucose: 112 mg/dL, Hemoglobin A1c: 5.8%" }],
        terms: [{ name: "Fasting Plasma Glucose", definition: "A test measuring blood sugar after not eating for at least 8 hours." }, { name: "Hemoglobin A1c (HbA1c)", definition: "An average of your blood sugar levels over the past 3 months." }] },
      { keywords: ['cholesterol', 'ldl', 'lipid', 'triglycerides'],
        answer: "Your Lipid Panel shows elevated cardiovascular risks: Total Cholesterol is 235 mg/dL (normal is < 200), Triglycerides are 165 mg/dL (normal is < 150), and LDL is at a critical high of 160 mg/dL (normal is < 100).",
        simpleExplanation: "Cholesterol is like wax package delivery inside your body. LDL is the delivery truck carrying wax packages to your arteries.",
        evidence: [{ docName: "Comprehensive_Metabolic_Panel.pdf", page: 2, text: "LDL Cholesterol (Bad): 160 mg/dL (CRITICAL HIGH)" }],
        terms: [{ name: "LDL (Low-Density Lipoprotein)", definition: "Commonly called 'bad' cholesterol. High levels lead to plaque buildup in arteries." }, { name: "Triglycerides", definition: "A type of fat found in your blood that your body uses for energy." }] },
      { keywords: ['mri', 'brain', 'hyperintensities', 'white matter'],
        answer: "The Brain MRI report indicates scattered, non-specific T2/FLAIR hyperintensities in the subcortical white matter. These are small, chronic, and likely minor microvascular changes.",
        simpleExplanation: "Think of the white matter in your brain as insulated cables under a street. The outer insulation gets tiny wear-and-tear spots that show up as bright spots on a scan.",
        evidence: [{ docName: "Brain_MRI_Report.pdf", page: 1, text: "Scattered, non-specific T2/FLAIR hyperintensities." }],
        terms: [{ name: "T2/FLAIR Hyperintensities", definition: "Bright spots on an MRI scan indicating minor changes or fluid accumulation." }, { name: "Subcortical White Matter", definition: "Deeper parts of the brain containing nerve fibers." }] }
    ];

    const PRESET_SUGGESTED_QUESTIONS = [
      "Why is my LDL cholesterol high?",
      "What does this MRI finding mean?",
      "Explain my blood report in simple terms",
      "What values are abnormal?",
      "What lifestyle changes should I consider?"
    ];

    // ==========================================
    // HELPER COMPONENTS
    // ==========================================
    function EmptyState({ icon, title, description }) {
      return (
        <div className="flex flex-col items-center justify-center py-16 px-6 text-center animate-fade-in">
          <div className="w-16 h-16 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center mb-4">
            <svg className="w-8 h-8 text-slate-300 dark:text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d={icon || "M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"} />
            </svg>
          </div>
          <h3 className="text-base font-semibold text-slate-700 dark:text-slate-300 mb-1">{title}</h3>
          <p className="text-sm text-slate-400 max-w-sm">{description}</p>
        </div>
      );
    }

    function PageThumbnail({ page, isActive, onClick }) {
      return (
        <button onClick={onClick} className={`w-full p-2 rounded-lg border text-left transition-all ${isActive ? 'border-blue-500 bg-blue-50 dark:bg-blue-900/30 shadow-md' : 'border-transparent hover:bg-slate-100 dark:hover:bg-slate-800'}`}>
          <div className="text-[9px] font-bold text-slate-400 mb-1">Page {page.pageNumber}</div>
          <div className="text-[10px] text-slate-500 dark:text-slate-400 line-clamp-3 leading-tight">{page.content.substring(0, 80)}...</div>
        </button>
      );
    }

    function SummaryCard({ title, items, icon, color = 'blue' }) {
      const colors = {
        blue: { bg: 'bg-blue-50 dark:bg-blue-950/30', border: 'border-blue-200 dark:border-blue-900', icon: 'text-blue-600', badge: 'bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-200' },
        amber: { bg: 'bg-amber-50 dark:bg-amber-950/30', border: 'border-amber-200 dark:border-amber-900', icon: 'text-amber-600', badge: 'bg-amber-100 text-amber-800 dark:bg-amber-900 dark:text-amber-200' },
        red: { bg: 'bg-red-50 dark:bg-red-950/30', border: 'border-red-200 dark:border-red-900', icon: 'text-red-600', badge: 'bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200' },
        emerald: { bg: 'bg-emerald-50 dark:bg-emerald-950/30', border: 'border-emerald-200 dark:border-emerald-900', icon: 'text-emerald-600', badge: 'bg-emerald-100 text-emerald-800 dark:bg-emerald-900 dark:text-emerald-200' }
      };
      const c = colors[color] || colors.blue;
      return (
        <div className={`${c.bg} p-4 sm:p-5 rounded-xl ${c.border} border shadow-sm animate-slide-up`}>
          <div className="flex items-center gap-2 mb-3">
            {icon && <span className={`text-lg ${c.icon}`}>{icon}</span>}
            <h3 className="text-xs sm:text-sm font-bold uppercase tracking-wide" style={{color: color === 'blue' ? '#2563eb' : color === 'amber' ? '#d97706' : color === 'red' ? '#dc2626' : '#059669'}}>{title}</h3>
            {items && <span className={`ml-auto text-[10px] font-bold px-2 py-0.5 rounded-full ${c.badge}`}>{items.length}</span>}
          </div>
          <div className="space-y-2">
            {items && items.map((item, i) => (
              <div key={i} className="flex items-start gap-2 text-[10px] sm:text-xs text-slate-600 dark:text-slate-300">
                <span className="mt-0.5 w-1.5 h-1.5 rounded-full flex-shrink-0" style={{backgroundColor: color === 'red' ? '#ef4444' : color === 'amber' ? '#f59e0b' : color === 'emerald' ? '#10b981' : '#3b82f6'}} />
                <span>{item}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function SummaryCardStatic({ title, items, color = 'blue' }) {
      return <SummaryCard title={title} items={items} color={color} />;
    }

    const getStatusColor = (status) => {
      const s = status.toUpperCase();
      if (s.includes('CRITICAL')) return { bg: 'bg-red-100 dark:bg-red-900/50', text: 'text-red-700 dark:text-red-300', dot: 'bg-red-500' };
      if (s.includes('HIGH')) return { bg: 'bg-amber-100 dark:bg-amber-900/50', text: 'text-amber-700 dark:text-amber-300', dot: 'bg-amber-500' };
      if (s.includes('LOW')) return { bg: 'bg-orange-100 dark:bg-orange-900/50', text: 'text-orange-700 dark:text-orange-300', dot: 'bg-orange-500' };
      return { bg: 'bg-emerald-100 dark:bg-emerald-900/50', text: 'text-emerald-700 dark:text-emerald-300', dot: 'bg-emerald-500' };
    };

    // ==========================================
    // MAIN APP
    // ==========================================
    function App() {
      const [apiKey, setApiKey] = useState(() => localStorage.getItem('medrep_gemini_apikey') || '');
      const [showApiKey, setShowApiKey] = useState(false);
      const [apiConnected, setApiConnected] = useState('NOT_CONNECTED');

      const [documents, setDocuments] = useState(() => {
        const saved = localStorage.getItem('medrep_documents');
        return saved ? JSON.parse(saved) : PRESET_DOCUMENTS;
      });
      const [notes, setNotes] = useState(() => {
        const saved = localStorage.getItem('medrep_notes');
        return saved ? JSON.parse(saved) : [];
      });
      const [bookmarks, setBookmarks] = useState(() => {
        const saved = localStorage.getItem('medrep_bookmarks');
        return saved ? JSON.parse(saved) : [];
      });

      const [activeTab, setActiveTab] = useState('viewer');
      const [selectedDocId, setSelectedDocId] = useState('doc-1');
      const [currentPageNum, setCurrentPageNum] = useState(1);
      const [zoomLevel, setZoomLevel] = useState(100);
      const [docSearchQuery, setDocSearchQuery] = useState('');
      const [fullscreen, setFullscreen] = useState(false);
      const [showThumbnails, setShowThumbnails] = useState(false);

      const [manualHighlights, setManualHighlights] = useState(() => {
        const saved = localStorage.getItem('medrep_highlights');
        return saved ? JSON.parse(saved) : [];
      });
      const [selectedHighlightText, setSelectedHighlightText] = useState('');

      const [chatInput, setChatInput] = useState('');
      const [chatMessages, setChatMessages] = useState([{
        sender: 'ai',
        text: "Hello! I am your **MedRep Patient Assistant**. I've processed your uploaded medical reports. Feel free to ask me questions like:\n* **What lab values are abnormal?**\n* **Explain my high cholesterol or A1c values.**\n* **What does the brain MRI report mean in simple terms?**",
        explanation: "I can translate complex jargon, point directly to facts in your document pages, and explain safety measures.",
        evidence: [], terms: []
      }]);
      const [isAiLoading, setIsAiLoading] = useState(false);
      const [suggestedQuestions, setSuggestedQuestions] = useState(PRESET_SUGGESTED_QUESTIONS);

      const [darkMode, setDarkMode] = useState(false);
      const [notification, setNotification] = useState(null);
      const [showDisclaimer, setShowDisclaimer] = useState(true);
      const [patientName, setPatientName] = useState(() => localStorage.getItem('medrep_patient_name') || '');

      const pageRef = useRef(null);
      const chatEndRef = useRef(null);
      const viewerRef = useRef(null);

      const toggleFullscreen = () => {
        if (!fullscreen && viewerRef.current?.requestFullscreen) viewerRef.current.requestFullscreen();
        else if (document.exitFullscreen) document.exitFullscreen();
        setFullscreen(!fullscreen);
      };

      useEffect(() => {
        const h = () => setFullscreen(!!document.fullscreenElement);
        document.addEventListener('fullscreenchange', h);
        return () => document.removeEventListener('fullscreenchange', h);
      }, []);

      // Persistence
      useEffect(() => { localStorage.setItem('medrep_documents', JSON.stringify(documents)); }, [documents]);
      useEffect(() => { localStorage.setItem('medrep_highlights', JSON.stringify(manualHighlights)); }, [manualHighlights]);
      useEffect(() => { localStorage.setItem('medrep_patient_name', patientName); }, [patientName]);
      useEffect(() => { localStorage.setItem('medrep_notes', JSON.stringify(notes)); }, [notes]);
      useEffect(() => { localStorage.setItem('medrep_bookmarks', JSON.stringify(bookmarks)); }, [bookmarks]);

      useEffect(() => { if (apiKey && apiConnected === 'NOT_CONNECTED') setApiConnected('CONNECTED'); }, []);

      const triggerNotification = useCallback((message, type = 'success') => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 4000);
      }, []);

      // Computed values
      const currentDoc = useMemo(() => documents.find(d => d.id === selectedDocId) || documents[0], [documents, selectedDocId]);
      const currentPage = useMemo(() => {
        if (!currentDoc) return null;
        return currentDoc.pages.find(p => p.pageNumber === currentPageNum) || currentDoc.pages[0];
      }, [currentDoc, currentPageNum]);

      const extractedLabs = useMemo(() => {
        const labs = [];
        documents.forEach(doc => {
          doc.pages.forEach(p => {
            const lines = p.content.split('\n');
            lines.forEach(line => {
              if (line.trim().startsWith('-')) {
                const cleanLine = line.replace('- ', '').trim();
                const parts = cleanLine.split(':');
                if (parts.length >= 2) {
                  const testName = parts[0].trim();
                  const remainingText = parts.slice(1).join(':').trim();
                  const resultMatch = remainingText.match(/^([0-9\.\<\>\s%]+[a-zA-Z\/dL]*)/);
                  const refMatch = remainingText.match(/\[Reference[^:]*:\s*([^\]]+)\]/i);
                  const statusMatch = remainingText.match(/\((HIGH|LOW|CRITICAL|CRITICAL HIGH)\)/i);
                  const result = resultMatch ? resultMatch[1].trim() : remainingText;
                  const reference = refMatch ? refMatch[1].trim() : 'N/A';
                  const status = statusMatch ? statusMatch[1].toUpperCase() : 'NORMAL';
                  labs.push({ docName: doc.name, testName, result, reference, status, raw: line });
                }
              }
            });
          });
        });
        return labs;
      }, [documents]);

      const labSummaryStats = useMemo(() => {
        let abnormalCount = 0, criticalCount = 0;
        extractedLabs.forEach(l => {
          if (l.status.includes('HIGH') || l.status.includes('LOW')) abnormalCount++;
          if (l.status.includes('CRITICAL')) criticalCount++;
        });
        return { abnormalCount, criticalCount, totalLabs: extractedLabs.length };
      }, [extractedLabs]);

      const allHighlights = useMemo(() => {
        const h = [];
        documents.forEach(doc => {
          doc.pages.forEach(p => {
            p.highlights.forEach(hh => h.push({ ...hh, docName: doc.name, page: p.pageNumber }));
          });
        });
        manualHighlights.forEach(mh => h.push({ ...mh, docName: currentDoc?.name || '', page: currentPageNum, isManual: true }));
        return h;
      }, [documents, manualHighlights, currentDoc, currentPageNum]);

      const getPatientName = (doc) => {
        if (patientName) return patientName;
        if (!doc) return 'Patient Record';
        return doc.name.replace(/\.\w+$/, '').replace(/[_-]/g, ' ').trim() || 'Patient Record';
      };

      // ------------------------------------------
      // FILE PARSING & OCR
      // ------------------------------------------
      const readFileText = async (file) => {
        const ext = file.name.split('.').pop().toLowerCase();
        if (ext === 'pdf') {
          try {
            const buf = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
            const pages = [];
            for (let i = 1; i <= pdf.numPages; i++) {
              const page = await pdf.getPage(i);
              const tc = await page.getTextContent();
              let text = tc.items.map(item => item.str).join(' ');

              const viewport = page.getViewport({ scale: 1.5 });
              const canvas = document.createElement('canvas');
              canvas.width = viewport.width;
              canvas.height = viewport.height;
              const ctx = canvas.getContext('2d');
              await page.render({ canvasContext: ctx, viewport: viewport }).promise;
              const imageDataUrl = canvas.toDataURL('image/jpeg', 0.8);

              // OCR for scanned pages
              let ocrText = null;
              if (!text || text.trim().length < 20) {
                try {
                  triggerNotification(`OCR scanning page ${i}...`, 'info');
                  const ocrResult = await Tesseract.recognize(canvas, 'eng');
                  ocrText = ocrResult.data.text;
                  if (ocrText && ocrText.trim().length > 10) text = ocrText;
                } catch(ocrErr) { console.warn('OCR failed:', ocrErr); }
              }

              pages.push({
                pageNumber: i, title: `Page ${i} of ${file.name}`,
                content: text || '[No text could be extracted]',
                imageUrl: imageDataUrl, highlights: []
              });
            }
            return pages;
          } catch(e) {
            triggerNotification('PDF parse failed: ' + file.name, 'error');
            return null;
          }
        }
        if (ext === 'txt') {
          const text = await file.text();
          return [{ pageNumber: 1, title: file.name, content: text, highlights: [] }];
        }
        return [{ pageNumber: 1, title: file.name,
          content: `[${file.name}]\nFormat: ${ext.toUpperCase()}\nSize: ${(file.size/1024).toFixed(1)} KB\n\nUpload PDF for full text extraction with OCR.`,
          highlights: [] }];
      };

      const handleFileUpload = async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        triggerNotification('Processing files...', 'info');
        for (const file of files) {
          const pagesData = await readFileText(file);
          if (!pagesData) continue;
          const newDoc = {
            id: `doc-${Date.now()}-${Math.floor(Math.random()*1000)}`,
            name: file.name, pagesCount: pagesData.length,
            uploadDate: new Date().toISOString().split('T')[0], pages: pagesData
          };
          setDocuments(prev => [...prev, newDoc]);
          setSelectedDocId(newDoc.id);
          setCurrentPageNum(1);
        }
        triggerNotification(`Uploaded ${files.length} report(s)!`, 'success');
      };

      const handleDeleteDocument = (docId) => {
        setDocuments(documents.filter(d => d.id !== docId));
        if (selectedDocId === docId) {
          const remaining = documents.filter(d => d.id !== docId);
          if (remaining.length > 0) { setSelectedDocId(remaining[0].id); setCurrentPageNum(1); }
        }
        triggerNotification('Document removed', 'info');
      };

      const handleDownloadFile = (format) => {
        if (!currentDoc) return;
        const patient = getPatientName(currentDoc);
        const baseName = currentDoc.name.replace(/\.\w+$/, '');
        if (format === 'pdf') {
          const pw = window.open('', '_blank');
          const html = currentDoc.pages.map(p =>
            `<div style="page-break-after:always;padding:20px;"><h2 style="color:#2563eb;font-size:14px;">${currentDoc.name}</h2><p style="color:#64748b;font-size:11px;">Patient: ${patient} | Page ${p.pageNumber}</p><pre style="font-size:12px;white-space:pre-wrap;">${p.content}</pre></div>`
          ).join('');
          pw.document.write(`<!DOCTYPE html><html><head><title>${currentDoc.name}</title></head><body>${html}<script>window.onload=function(){window.print()}<\/script></body></html>`);
          pw.document.close();
          triggerNotification('PDF print window opened.', 'success');
          return;
        }
        const content = currentDoc.pages.map(p => `=== ${currentDoc.name} | Patient: ${patient} | Page ${p.pageNumber} ===\n\n${p.content}`).join('\n\n');
        const blob = new Blob([content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = baseName + '.txt';
        a.click(); URL.revokeObjectURL(url);
        triggerNotification(`Downloaded ${baseName}.txt`, 'success');
      };

      // ------------------------------------------
      // CITATION & HIGHLIGHT HANDLERS
      // ------------------------------------------
      const handleCitationClick = (docName, pageNum) => {
        const matchedDoc = documents.find(d => d.name === docName);
        if (matchedDoc) {
          setSelectedDocId(matchedDoc.id);
          setCurrentPageNum(pageNum);
          setActiveTab('viewer');
          triggerNotification(`Navigated to ${docName} Page ${pageNum}`, 'info');
          setTimeout(() => pageRef.current?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
        } else triggerNotification(`Document "${docName}" not found.`, 'error');
      };

      const handleTextSelection = () => {
        const selection = window.getSelection();
        const selectedText = selection.toString().trim();
        if (selectedText.length > 3 && selectedText.length < 500) setSelectedHighlightText(selectedText);
      };

      const addManualHighlight = () => {
        if (!selectedHighlightText) return;
        const newH = { id: `man-h-${Date.now()}`, text: selectedHighlightText, label: 'Custom Highlight' };
        setManualHighlights([...manualHighlights, newH]);
        setNotes([...notes, { id: `note-${Date.now()}`, text: `Saved Highlight: "${selectedHighlightText}"`, date: new Date().toISOString().split('T')[0] }]);
        setSelectedHighlightText('');
        triggerNotification('Saved highlight as a note!', 'success');
      };

      const handleExplainSelection = () => {
        if (!selectedHighlightText) return;
        setChatInput(`Explain this specific quote from my medical report in simple terms: "${selectedHighlightText}"`);
        setSelectedHighlightText('');
        triggerNotification('Question pre-filled! Press send.', 'info');
      };

      const toggleBookmark = () => {
        if (!currentDoc) return;
        const bookmarkId = `${currentDoc.id}-p${currentPageNum}`;
        if (bookmarks.includes(bookmarkId)) {
          setBookmarks(bookmarks.filter(b => b !== bookmarkId));
          triggerNotification('Bookmark removed', 'info');
        } else {
          setBookmarks([...bookmarks, bookmarkId]);
          triggerNotification('Page bookmarked!', 'success');
        }
      };

      const isCurrentPageBookmarked = () => currentDoc && bookmarks.includes(`${currentDoc.id}-p${currentPageNum}`);

      // ------------------------------------------
      // CHAT / AI
      // ------------------------------------------
      const handleSendMessage = async (e) => {
        if (e) e.preventDefault();
        if (!chatInput.trim()) return;
        const userMessage = chatInput.trim();
        setChatInput('');
        setChatMessages(prev => [...prev, { sender: 'user', text: userMessage }]);
        setIsAiLoading(true);

        const contextBody = documents.map(doc =>
          `Document: ${doc.name}\n` + doc.pages.map(p => `[Page ${p.pageNumber}]\n${p.content}`).join('\n')
        ).join('\n\n');

        if (apiConnected === 'CONNECTED' && apiKey) {
          try {
            const systemPrompt = `You are "MedRep Assistant", a medical communication and patient education AI tool. Explain based only on provided documents. Never diagnose or prescribe.`;
            const modelName = 'gemini-2.0-flash';
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ contents: [{ role: 'user', parts: [{ text: systemPrompt + '\n\n---\n\n' + contextBody + '\n\nUSER QUESTION:\n' + userMessage }] }] })
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error?.message || 'HTTP ' + response.status);
            const generatedText = data.candidates?.[0]?.content?.parts?.[0]?.text || "No response received.";
            const matchedCitations = [];
            documents.forEach(doc => {
              doc.pages.forEach(p => {
                if (userMessage.toLowerCase().includes(doc.name.toLowerCase()) || generatedText.toLowerCase().includes(doc.name.toLowerCase()))
                  matchedCitations.push({ docName: doc.name, page: p.pageNumber, text: 'Reference' });
              });
            });
            setChatMessages(prev => [...prev, {
              sender: 'ai', text: generatedText,
              explanation: "Response from Gemini 2.0 Flash based on your documents.",
              evidence: matchedCitations.length > 0 ? matchedCitations : [{ docName: documents[0]?.name || "Document", page: 1, text: "Reference" }],
              terms: []
            }]);
            generateSuggestedQuestions(generatedText);
          } catch(error) {
            console.error("Gemini API Error:", error);
            triggerNotification("Gemini API error: " + error.message, "error");
            executePresetFallback(userMessage);
          }
        } else {
          setTimeout(() => executePresetFallback(userMessage), 600);
        }
        setIsAiLoading(false);
      };

      const executePresetFallback = (userMessage) => {
        const normalizedInput = userMessage.toLowerCase();
        let bestMatch = null;
        for (const preset of PRESET_RESPONSES) {
          if (preset.keywords.filter(k => normalizedInput.includes(k)).length > 0) { bestMatch = preset; break; }
        }
        if (bestMatch) {
          setChatMessages(prev => [...prev, { sender: 'ai', text: bestMatch.answer, explanation: bestMatch.simpleExplanation, evidence: bestMatch.evidence, terms: bestMatch.terms }]);
          generateSuggestedQuestions(bestMatch.answer);
        } else {
          let extractedLines = [];
          documents.forEach(doc => doc.pages.forEach(p => {
            p.content.split('\n').forEach(line => {
              if (line.toLowerCase().includes('high') || line.toLowerCase().includes('low') || line.toLowerCase().includes('critical'))
                extractedLines.push({ docName: doc.name, page: p.pageNumber, text: line.replace('- ', '') });
            });
          }));
          const text = extractedLines.length > 0
            ? "I found these notable indicators:\n\n" + extractedLines.map(el => `* **${el.text}** (${el.docName} Pg ${el.page})`).join('\n') + "\n\nAsk me to explain any of these."
            : "I couldn't find matching data. Ask about 'glucose', 'cholesterol', or 'MRI'.";
          setChatMessages(prev => [...prev, { sender: 'ai', text, explanation: "Searching through records...", evidence: extractedLines.length > 0 ? [extractedLines[0]] : [], terms: [] }]);
        }
      };

      const generateSuggestedQuestions = (response) => {
        const qs = ["What do these values mean?", "Which results are abnormal?", "Explain in simple language", "What should I ask my doctor?"];
        if (response.toLowerCase().includes('cholesterol') || response.toLowerCase().includes('ldl')) qs.unshift("How can I lower my LDL cholesterol?");
        if (response.toLowerCase().includes('glucose') || response.toLowerCase().includes('a1c')) qs.unshift("What lifestyle changes help with prediabetes?");
        setSuggestedQuestions(qs);
      };

      useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [chatMessages]);

      const handleAddNote = (e) => {
        e.preventDefault();
        const noteText = e.target.elements.newNoteText.value.trim();
        if (!noteText) return;
        setNotes([...notes, { id: `note-${Date.now()}`, text: noteText, date: new Date().toISOString().split('T')[0] }]);
        e.target.reset();
        triggerNotification("Note saved!", "success");
      };

      // ==========================================
      // RENDER
      // ==========================================
      return (
        <div className={`min-h-screen flex flex-col font-sans transition-colors duration-300 ${darkMode ? 'bg-slate-900 text-slate-100' : 'bg-slate-50 text-slate-800'}`}>

          {/* Toast */}
          {notification && (
            <div className={`fixed top-5 right-5 z-50 flex items-center gap-3 px-4 py-3 rounded-lg shadow-xl animate-bounce max-w-sm ${notification.type === 'error' ? 'bg-red-600' : notification.type === 'info' ? 'bg-blue-600' : 'bg-emerald-600'} text-white`}>
              <svg className="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clipRule="evenodd" /></svg>
              <span className="text-sm font-semibold">{notification.message}</span>
            </div>

          {/* Safety disclaimer */}
          {showDisclaimer && (
            <div className="bg-gradient-to-r from-red-500 to-amber-500 text-white text-[10px] sm:text-xs font-semibold px-4 py-2 text-center flex items-center justify-center gap-2 relative z-40 shadow-sm animate-slide-up">
              <svg className="w-4 h-4 text-white animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
              <span><strong>SAFETY DISCLAIMER:</strong> MedRep is an educational tool. Always consult a physician.</span>
              <button onClick={() => setShowDisclaimer(false)} className="ml-2 text-white/70 hover:text-white"><svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg></button>
            </div>
          )}

          {/* Header */}
          <header className={`px-4 sm:px-6 py-3 border-b flex items-center justify-between ${darkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'}`}>
            <div className="flex items-center gap-3">
              <div className="bg-blue-600 text-white p-2 rounded-xl shadow-lg">
                <svg className="w-5 h-5 sm:w-6 sm:h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" strokeWidth="2.5" /><path d="M14 2v6h6" strokeWidth="2.5" /><path d="M12 11v6M9 14h6" strokeWidth="2.5" className="text-emerald-300" /></svg>
              </div>
              <div>
                <h1 className="text-lg sm:text-xl font-bold tracking-tight">MedRep</h1>
                <p className="text-[10px] sm:text-xs text-slate-400">Understand Your Medical Reports</p>
              </div>
            </div>
            <div className="flex items-center gap-2 sm:gap-4">
              {documents.length > 0 && (
                <div className="hidden md:flex items-center gap-2 text-[10px] sm:text-xs">
                  {labSummaryStats.criticalCount > 0 && <span className="bg-red-100 dark:bg-red-900/50 text-red-700 dark:text-red-300 px-2.5 py-1 rounded-lg font-semibold animate-pulse-soft">{labSummaryStats.criticalCount} Critical</span>}
                  {labSummaryStats.abnormalCount > 0 && <span className="bg-amber-100 dark:bg-amber-900/50 text-amber-700 dark:text-amber-300 px-2.5 py-1 rounded-lg font-semibold">{labSummaryStats.abnormalCount} Abnormal</span>}
                </div>
              )}
              <button onClick={toggleFullscreen} className="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition hidden md:block">
                <svg className="w-4 h-4 sm:w-5 sm:h-5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={fullscreen ? "M9 9V4.5M9 9H4.5M9 9L3.75 3.75M9 15v4.5M9 15H4.5M9 15l-5.25 5.25M15 9h4.5M15 9V4.5M15 9l5.25-5.25M15 15h4.5M15 15v4.5m0-4.5l5.25 5.25" : "M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15"} /></svg>
              </button>
              <button onClick={() => setDarkMode(!darkMode)} className="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition">
                {darkMode ? <svg className="w-4 h-4 sm:w-5 sm:h-5 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M12 5a7 7 0 000 14" /></svg> : <svg className="w-4 h-4 sm:w-5 sm:h-5 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>}
              </button>
            </div>
          </header>

          {/* Main layout */}
          <div className="flex-1 flex flex-col lg:flex-row overflow-hidden">

            {/* LEFT SIDEBAR */}
            <aside className={`w-full lg:w-[20%] flex-shrink-0 flex flex-col border-r overflow-y-auto ${darkMode ? 'bg-slate-950 border-slate-800' : 'bg-slate-100 border-slate-200'} p-3 sm:p-4 space-y-4`}>
              
              {/* Gemini API Config */}
              <div className={`p-3 rounded-xl border ${darkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'} animate-fade-in`}>
                <div className="flex items-center justify-between mb-2">
                  <span className="text-[10px] sm:text-xs font-bold tracking-wider uppercase text-slate-400">Gemini 2.0 Flash</span>
                  <div className="flex items-center gap-1.5">
                    <span className={`w-2 h-2 rounded-full ${apiConnected === 'CONNECTED' ? 'bg-emerald-500' : apiConnected === 'CONNECTING' ? 'bg-yellow-500 animate-ping' : 'bg-red-500'}`} />
                    <span className="text-[9px] sm:text-[10px] font-semibold text-slate-400">{apiConnected === 'CONNECTED' ? 'Connected' : apiConnected === 'CONNECTING' ? 'Connecting...' : 'Offline'}</span>
                  </div>
                </div>
                <div className="space-y-2">
                  <div className="relative">
                    <input type={showApiKey ? 'text' : 'password'} placeholder="Enter Gemini API Key" value={apiKey} onChange={(e) => setApiKey(e.target.value)} className={`w-full text-[10px] sm:text-xs px-2.5 py-1.5 rounded-lg border focus:ring-1 focus:ring-blue-500 outline-none ${darkMode ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50 border-slate-200 text-slate-800'}`} />
                    <button onClick={() => setShowApiKey(!showApiKey)} className="absolute right-2 top-1.5 text-slate-400 hover:text-slate-600 text-[9px] sm:text-[10px] font-bold">{showApiKey ? 'Hide' : 'Show'}</button>
                  </div>
                  {apiConnected === 'CONNECTED' ? (
                    <button onClick={() => { setApiKey(''); localStorage.removeItem('medrep_gemini_apikey'); setApiConnected('NOT_CONNECTED'); triggerNotification('Disconnected', 'info'); }} className="w-full bg-slate-200 hover:bg-slate-300 dark:bg-slate-800 dark:hover:bg-slate-700 text-slate-800 dark:text-white text-[10px] sm:text-xs font-semibold py-1.5 rounded-lg transition">Disconnect</button>
                  ) : (
                    <button onClick={() => { if (!apiKey.trim()) { triggerNotification('Enter API Key', 'error'); return; } setApiConnected('CONNECTING'); setTimeout(() => { localStorage.setItem('medrep_gemini_apikey', apiKey); setApiConnected('CONNECTED'); triggerNotification('Gemini Connected!', 'success'); }, 800); }} disabled={apiConnected === 'CONNECTING'} className={`w-full text-white text-[10px] sm:text-xs font-semibold py-1.5 rounded-lg transition ${apiConnected === 'CONNECTING' ? 'bg-yellow-500 cursor-wait' : 'bg-blue-600 hover:bg-blue-700'}`}>{apiConnected === 'CONNECTING' ? 'Connecting...' : 'Connect'}</button>
                  )}
                </div>
              </div>

              {/* Patient Name */}
              <div className={`p-3 rounded-xl border ${darkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'}`}>
                <div className="text-[9px] font-semibold text-slate-400 mb-1">Patient Name</div>
                <input type="text" placeholder="Enter patient name" value={patientName} onChange={(e) => setPatientName(e.target.value)} className={`w-full text-[10px] sm:text-xs px-2.5 py-1.5 rounded-lg border focus:ring-1 focus:ring-blue-500 outline-none ${darkMode ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50 border-slate-200 text-slate-800'}`} />
              </div>

              {/* Upload */}
              <div>
                <h3 className="text-[10px] sm:text-xs font-bold tracking-wider uppercase text-slate-400 mb-2">Upload Reports</h3>
                <div className={`p-3 sm:p-4 rounded-xl border-2 border-dashed text-center transition cursor-pointer ${darkMode ? 'border-slate-800 bg-slate-900 hover:bg-slate-800' : 'border-slate-300 bg-white hover:bg-slate-50'}`}>
                  <input type="file" id="file-upload" multiple accept=".pdf,.docx,.jpg,.jpeg,.png" onChange={handleFileUpload} className="hidden" />
                  <label htmlFor="file-upload" className="cursor-pointer block space-y-2">
                    <svg className="w-7 h-7 sm:w-8 sm:h-8 mx-auto text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6" /></svg>
                    <div className="text-[10px] sm:text-xs font-semibold text-slate-500 dark:text-slate-300">Drag & Drop files</div>
                    <div className="text-[9px] sm:text-[10px] text-slate-400">PDF, DOCX, JPG, PNG</div>
                    <div className="text-[8px] text-slate-400">OCR auto-extracts text from scanned PDFs</div>
                  </label>
                </div>
              </div>

              {/* Files List */}
              <div className="flex-1 flex flex-col min-h-0">
                <h3 className="text-[10px] sm:text-xs font-bold tracking-wider uppercase text-slate-400 mb-2">Reports ({documents.length})</h3>
                <div className="flex-1 overflow-y-auto space-y-1.5">
                  {documents.length === 0 ? (
                    <div className={`p-3 sm:p-4 rounded-lg text-center text-[10px] sm:text-xs italic border ${darkMode ? 'bg-slate-900 border-slate-800 text-slate-400' : 'bg-white border-slate-200 text-slate-400'}`}>No files loaded yet.</div>
                  ) : documents.map(doc => {
                    const isSelected = doc.id === selectedDocId;
                    return (
                      <div key={doc.id} onClick={() => { setSelectedDocId(doc.id); setCurrentPageNum(1); }} className={`p-2 rounded-lg cursor-pointer transition flex items-start gap-2 border text-[10px] sm:text-xs animate-fade-in ${isSelected ? 'bg-white dark:bg-slate-800 border-blue-500 shadow-md' : 'hover:bg-slate-200 dark:hover:bg-slate-800 border-transparent'}`}>
                        <div className="p-1 rounded bg-blue-100 text-blue-800 mt-0.5 flex-shrink-0">
                          <svg className="w-3 h-3 sm:w-4 sm:h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                        </div>
                        <div className="flex-1 min-w-0">
                          <div className="font-medium truncate text-slate-700 dark:text-slate-200">{doc.name}</div>
                          <div className="flex items-center gap-2 mt-0.5 text-[9px] text-slate-400"><span>{doc.pagesCount} pg</span><span>•</span><span>{doc.uploadDate}</span></div>
                        </div>
                        <button onClick={(e) => { e.stopPropagation(); handleDeleteDocument(doc.id); }} className="p-1 text-slate-300 hover:text-red-500 opacity-0 hover:opacity-100 transition flex-shrink-0">
                          <svg className="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" /></svg>
                        </button>
                      </div>
                    );
                  })}
                </div>
              </div>
            </aside>

            {/* CENTER PANEL */}
            <main className="flex-1 flex flex-col min-w-0" ref={viewerRef}>
              {/* Tabs */}
              <div className={`flex items-center px-2 sm:px-4 py-2 border-b overflow-x-auto gap-1 ${darkMode ? 'bg-slate-900 border-slate-800' : 'bg-white border-slate-200'}`}>
                {[
                  { id: 'viewer', label: 'Viewer', icon: 'M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z' },
                  { id: 'dashboard', label: 'Labs', icon: 'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z' },
                  { id: 'summary', label: 'Summary', icon: 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z' },
                  { id: 'comparison', label: 'Compare', icon: 'M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4' },
                  { id: 'notes', label: 'Notes', icon: 'M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z' }
                ].map(tab => (
                  <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex items-center gap-1.5 px-2.5 sm:px-3 py-1.5 rounded-lg text-[10px] sm:text-xs font-semibold transition whitespace-nowrap ${activeTab === tab.id ? 'bg-blue-600 text-white shadow' : 'hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 dark:text-slate-300'}`}>
                    <svg className="w-3 h-3 sm:w-3.5 sm:h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={tab.icon} /></svg>
                    <span className="hidden sm:inline">{tab.label}</span>
                  </button>
                ))}
              </div>

              {/* TAB: VIEWER */}
              {activeTab === 'viewer' && (
                <div className="flex-1 flex flex-col min-h-0 bg-slate-200 dark:bg-slate-900">
                  <div className={`p-2 sm:p-3 border-b flex flex-wrap items-center justify-between gap-2 ${darkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-200'}`}>
                    {currentDoc ? (
                      <>
                        <div className="flex items-center gap-2 min-w-0">
                          <span className="text-xs sm:text-sm font-semibold truncate max-w-[100px] sm:max-w-[200px]">{currentDoc.name}</span>
                          <span className="text-[9px] sm:text-[10px] text-blue-500 font-medium hidden sm:inline">{getPatientName(currentDoc)}</span>
                          <span className="text-[10px] sm:text-xs text-slate-400">Pg {currentPageNum}/{currentDoc.pagesCount}</span>
                        </div>

                </div>
              </div>
              <div className="flex-1 overflow-y-auto p-3 sm:p-4 space-y-3 sm:space-y-4">
                {chatMessages.map((msg, i) => (
                  <div key={i} className={`flex flex-col gap-1.5 sm:gap-2 ${msg.sender === 'user' ? 'items-end' : 'items-start'} animate-fade-in`}>
                    <div className={`p-2.5 sm:p-3 rounded-2xl max-w-[92%] text-[10px] sm:text-xs shadow-sm leading-relaxed ${msg.sender === 'user' ? 'bg-blue-600 text-white rounded-br-none' : `${darkMode ? 'bg-slate-800 text-slate-200' : 'bg-slate-100 text-slate-800'} rounded-bl-none border`}`}>
                      <p className="whitespace-pre-line">{msg.text}</p>
                    </div>
                    {msg.sender === 'ai' && msg.explanation && (
                      <div className={`ml-1 sm:ml-2 p-2.5 sm:p-3 rounded-xl max-w-[85%] text-[9px] sm:text-[10px] italic leading-relaxed animate-slide-up ${darkMode ? 'bg-emerald-950/40 border border-emerald-900 text-emerald-200' : 'bg-emerald-50 border border-emerald-100 text-emerald-800'}`}>
                        <strong className="not-italic">Simple Analogy:</strong> {msg.explanation}
                      </div>
                    )}
                    {msg.sender === 'ai' && msg.terms && msg.terms.length > 0 && (
                      <div className={`ml-1 sm:ml-2 p-2.5 sm:p-3 rounded-xl max-w-[85%] text-[9px] sm:text-[10px] animate-slide-up ${darkMode ? 'bg-blue-950/40 border border-blue-900' : 'bg-blue-50 border border-blue-100'}`}>
                        <strong className="text-blue-600 dark:text-blue-300">Medical Terms:</strong>
                        <div className="mt-1 space-y-1">{msg.terms.map((term, tIdx) => <div key={tIdx} className="flex items-start gap-1"><span className="font-semibold whitespace-nowrap">{term.name}:</span><span className="text-slate-500 dark:text-slate-400">{term.definition}</span></div>)}</div>
                      </div>
                    )}
                    {msg.sender === 'ai' && msg.evidence && msg.evidence.length > 0 && (
                      <div className="ml-1 sm:ml-2 flex flex-wrap gap-1 max-w-[85%] animate-slide-up">
                        {msg.evidence.map((ev, evIdx) => (
                          <button key={evIdx} onClick={() => handleCitationClick(ev.docName, ev.page)} className="text-[8px] sm:text-[9px] bg-blue-50 text-blue-700 hover:bg-blue-100 dark:bg-blue-950 dark:text-blue-200 border rounded-lg px-1.5 py-0.5 sm:px-2 sm:py-1 flex items-center gap-0.5 sm:gap-1 transition font-medium">
                            <svg className="w-2.5 h-2.5 sm:w-3 sm:h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
                            {ev.docName} • Pg {ev.page}
                          </button>
                        ))}
                      </div>
                    )}
                  </div>
                ))}
                {isAiLoading && (
                  <div className="flex items-center gap-2 p-3 text-[10px] sm:text-xs text-slate-400 italic">
                    <div className="flex gap-1">
                      <span className="w-1.5 h-1.5 sm:w-2 sm:h-2 bg-blue-500 rounded-full animate-bounce" style={{animationDelay: '0ms'}} />
                      <span className="w-1.5 h-1.5 sm:w-2 sm:h-2 bg-blue-500 rounded-full animate-bounce" style={{animationDelay: '150ms'}} />
                      <span className="w-1.5 h-1.5 sm:w-2 sm:h-2 bg-blue-500 rounded-full animate-bounce" style={{animationDelay: '300ms'}} />
                    </div>
                    Analyzing your reports...
                  </div>
                )}
                <div ref={chatEndRef} />
              </div>

              {suggestedQuestions.length > 0 && !isAiLoading && (
                <div className={`px-3 sm:px-4 py-2 border-t ${darkMode ? 'border-slate-800 bg-slate-900' : 'border-slate-100 bg-slate-50'}`}>
                  <div className="text-[8px] sm:text-[9px] font-bold uppercase text-slate-400 mb-1.5">Suggested</div>
                  <div className="flex flex-wrap gap-1">
                    {suggestedQuestions.slice(0, 3).map((q, idx) => (
                      <button key={idx} onClick={() => setChatInput(q)} className="text-[8px] sm:text-[9px] bg-white dark:bg-slate-800 border dark:border-slate-700 text-slate-600 dark:text-slate-300 px-2 py-1 rounded-lg hover:bg-blue-50 dark:hover:bg-slate-700 transition whitespace-nowrap">{q}</button>
                    ))}
                  </div>
                </div>
              )}

              <form onSubmit={handleSendMessage} className="p-3 sm:p-4 border-t flex gap-2">
                <input type="text" placeholder="Ask about your reports..." value={chatInput} onChange={(e) => setChatInput(e.target.value)} className={`flex-1 text-[10px] sm:text-xs px-3 py-2 rounded-xl border outline-none ${darkMode ? 'bg-slate-800 border-slate-700 text-white' : 'bg-slate-50 border-slate-200'}`} />
                <button type="submit" disabled={isAiLoading || !chatInput.trim()} className="bg-blue-600 hover:bg-blue-700 disabled:bg-slate-300 disabled:cursor-not-allowed text-white px-3 sm:px-4 py-2 rounded-xl text-[10px] sm:text-xs font-semibold transition">
                  <svg className="w-3.5 h-3.5 sm:w-4 sm:h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" /></svg>
                </button>
              </form>
              <div className={`px-3 sm:px-4 py-2 border-t text-[8px] sm:text-[9px] text-center font-medium ${darkMode ? 'bg-slate-950 border-slate-800 text-slate-600' : 'bg-slate-50 border-slate-100 text-slate-400'}`}>MedRep is an educational tool. Always consult a healthcare professional.</div>
            </section>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
